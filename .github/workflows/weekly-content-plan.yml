name: AYARI Weekly Content Plan

on:
  schedule:
    # Every Sunday at 6:00 PM UTC (8:00 PM CET)
    - cron: "0 18 * * 0"
  workflow_dispatch:

jobs:
  generate-plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate weekly content plan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CONTENT_BOT_TOKEN: ${{ secrets.TELEGRAM_CONTENT_BOT_TOKEN }}
          TELEGRAM_CONTENT_CHAT_ID: ${{ secrets.TELEGRAM_CONTENT_CHAT_ID }}
        run: python scripts/content_planner_longevity.py

      - name: Commit plan to repository
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add reports/weekly/
          git diff --staged --quiet || git commit -m "Weekly content plan $(date +%Y-%m-%d)"
          git push
