name: AYARI Personal Weekly Instagram Report

on:
  schedule:
    # Every Monday at 08:15 CET (07:15 UTC)
    - cron: "15 7 * * 1"
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run @ayari weekly report
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID_AYARI: ${{ secrets.IG_USER_ID_AYARI }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID_AYARI_REPORTS: ${{ secrets.TELEGRAM_CHAT_ID_AYARI_REPORTS }}
        run: python scripts/ayari_weekly_report.py
